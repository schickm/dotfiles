# Remote control settings
allow_remote_control yes
listen_on unix:/tmp/kitty

# Cursor
cursor_shape beam
cursor_beam_thickness 10
# cursor_blink_interval 0.5 ease-in-out
# cursor_trail 1 shell_integration no-cursor

# Font
font_family JetBrainsMono NFM SemiBold
font_size 12.0

# Scrolling
wheel_scroll_multiplier 15.0
touch_scroll_multiplier 10.0

# Don't prompt when closing window
confirm_os_window_close 0

# Window padding
window_padding_width 2

# Keybindings
map ctrl+shift+n new_os_window_with_cwd

# Hint file:line references on screen (e.g. from Claude Code output) and open
# the picked one in Helix in a new niri window (:q to close and return).
# Resolves bare basenames by searching the git root. See ~/bin/hx-open.
# NB: linenum-action=self would PASTE the command instead of running it.
# (Overrides kitty's default ctrl+shift+l = next_layout, unused here.)
map ctrl+shift+l kitten hints --type=linenum --linenum-action=os_window /home/matt/bin/hx-open {path} {line}

# URL opening: open clicked URLs as a tab in the Chrome window on the current
# niri workspace, or a fresh window here if there isn't one.
# See dotfiles_shared/bin/bin/workspace-url-open.
open_url_with /home/matt/bin/workspace-url-open


# BEGIN_KITTY_THEME
# Solarized Light
include current-theme.conf
# END_KITTY_THEME
